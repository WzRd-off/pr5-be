<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кінотека</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="topbar">
            <h1>Кінотека</h1>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="panel-row">
                <div class="search-group">
                    <label for="search">Пошук</label>
                    <input id="search" type="search" placeholder="Назва фільму">
                </div>
                <div class="search-group">
                    <label for="filter-genre">Жанр</label>
                    <select id="filter-genre"></select>
                </div>
                <div class="search-group">
                    <label for="sort">Сортувати</label>
                    <select id="sort">
                        <option value="">Без сортування</option>
                        <option value="title">Назва</option>
                        <option value="year">Рік</option>
                        <option value="rating">Рейтинг</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="panel form-panel">
            <h2 id="form-heading">Додати фільм</h2>
            <form id="movie-form">
                <input id="movie-id" type="hidden">
                <label>
                    Назва
                    <input id="title" required>
                </label>
                <label>
                    Рік
                    <input id="year" type="number" min="1900" max="2100">
                </label>
                <label>
                    Жанр
                    <select id="genre_id" required>
                        <option value="">Оберіть жанр</option>
                    </select>
                </label>
                <label>
                    Опис
                    <textarea id="description" rows="3"></textarea>
                </label>
                <label>
                    Рейтинг
                    <input id="rating" type="number" min="0" max="10" step="0.1">
                </label>
                <div class="form-buttons">
                    <button id="submit-button" type="submit">Додати</button>
                    <button id="cancel-edit" class="secondary hidden">Скасувати</button>
                </div>
                <div id="form-message" class="message"></div>
            </form>
        </section>

        <section class="panel">
            <h2>Список фільмів</h2>
            <div id="movies-message" class="message"></div>
            <div id="movie-list" class="movie-list"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
